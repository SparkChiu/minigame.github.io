<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>猪突对对碰 v0.0.10 性能终极版 · 流畅优化</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a12;color:#fff;font-family:Arial,sans-serif;overflow:hidden;user-select:none;}

#backBtn{
  position:fixed;top:10px;left:10px;z-index:9999;
  color:#00ff84;font-size:18px;font-weight:bold;
  text-decoration:none;background:rgba(0,0,0,0.6);
  padding:6px 12px;border-radius:8px;border:1px solid #00ff84;
}

/* 版本号放在返回按钮右侧 */
#version{
  position:fixed;top:10px;left:90px;z-index:9999;
  color:#00ff84;font-size:16px;font-weight:bold;
  background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:8px;
}

/* 游戏说明按钮 */
#guideBtn{
  position:fixed;top:10px;left:170px;z-index:9999;
  color:#ffd000;font-size:16px;font-weight:bold;
  background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:8px;
  border:1px solid #ffd000;cursor:pointer;
}

/* 游戏说明弹窗 */
#guidePanel{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:rgba(0,0,0,0.95);z-index:20000;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.guide-content{
  background:#1a1a2e;border:2px solid #ffd000;border-radius:16px;
  padding:24px;max-width:400px;width:90%;
  line-height:1.6;font-size:16px;
}
.guide-content h3{
  color:#ffd000;text-align:center;margin-bottom:12px;
}
.guide-content p{margin:6px 0;}
#closeGuide{
  margin-top:16px;padding:8px 20px;background:#00ff84;color:#000;
  border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;
}

#fps{
  position:fixed;top:10px;right:140px;z-index:9999;
  color:#0ff;font-size:14px;background:#0006;padding:4px 8px;border-radius:6px;
}

#goldBar{
  position:fixed;top:10px;right:10px;z-index:9999;
  color:#ffd000;font-size:18px;font-weight:bold;
  background:rgba(0,0,0,0.6);padding:6px 12px;border-radius:8px;
}

#rankBtn{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:9999;
  color:#fff;font-size:16px;font-weight:bold;
  background:rgba(255,190,0,0.6);padding:6px 12px;border-radius:8px;
  border:none;cursor:pointer;
}

#levelBar{
  position:fixed;top:100px;left:50%;transform:translateX(-50%);z-index:9999;
  color:#fff;font-size:18px;font-weight:bold;
  background:rgba(255,190,0,0.8);padding:6px 14px;border-radius:8px;
}

/* 捕获提示 + 骰子动画 */
#captureTip{
  position:fixed;top:50%;left:50%;transform:translate3d(-50%,-50%,0);z-index:99999;
  background:#111;padding:24px 36px;border-radius:16px;border:3px solid #ffaa00;
  font-size:20px;text-align:center;display:none;min-width:280px;
  will-change:transform;
}
#captureTip.show{display:block;}
#diceRoll{
  font-size:60px;font-weight:bold;color:#ffcc00;margin:10px 0;
  animation: pulse 0.1s infinite alternate;
  will-change:transform;
}
@keyframes pulse {
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* 升级飘字样式 */
.levelUpText{
  position:absolute;z-index:20;color:#00ff84;font-weight:bold;
  font-size:16px;animation:levelUpAnim 0.8s forwards;text-shadow:0 0 6px #00ff84;
  white-space:nowrap;pointer-events:none;will-change:transform,opacity;
}
@keyframes levelUpAnim{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-30px);}
}

#rankPanel{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:rgba(0,0,0,0.9);z-index:10000;
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
#rankPanel h2{color:#ffd000;margin-bottom:10px;}
#rankList{
  width:90%;max-width:400px;max-height:60vh;overflow-y:auto;
}
.rank-item{
  padding:10px;margin:6px;background:#1a1a2e;border-radius:8px;
  font-size:16px;text-align:center;
}
#closeRank{
  margin-top:16px;padding:8px 20px;background:#ff4444;color:#fff;
  border:none;border-radius:8px;font-size:16px;cursor:pointer;
}

#game{width:100vw;height:100vh;position:relative;background:linear-gradient(to bottom,#111,#222);}

.team-area{
  position:fixed;left:50%;transform:translate3d(-50%,0,0);
  display:flex;gap:8px;padding:8px;
  width:98%;max-width:700px;
  flex-wrap:wrap;justify-content:center;
}
#playerTeam{bottom:8px;}

.creature{
  width:80px;min-width:80px;height:auto;background:#1a1a2e;
  border:2px solid #888;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:30px;position:relative;padding:5px;
  will-change:transform;
}
.creature.alive{border-color:#00ff84;}
.creature.dead{border-color:#444;opacity:0.7;}
.creature .level{
  position:absolute;top:-2px;left:0;right:0;text-align:center;
  font-size:12px;color:#ffd000;font-weight:bold;
}
.creature .stat{
  font-size:12px;color:#fff;background:#0005;padding:2px 4px;border-radius:4px;margin-top:2px;width:90%;text-align:center;
}
.creature .btn{
  font-size:11px;padding:2px 4px;margin:1px;border-radius:4px;border:none;
  background:#222;color:#fff;cursor:pointer;width:100%;
}
.creature .btn.up{background:#006633;}
.creature .btn.rev{background:#006688;}
.creature .btn.bur{background:#880000;}

/* ========== ✅ 战斗区域：永久锁定居中，绝不移动 ========== */
#battleZone{
  position:absolute;top:100px;left:50%;transform:translate3d(-50%,0,0) !important;
  width:85vw;height:46vh;max-width:500px;
  background:rgba(0,0,0,0.3);border:1px solid #444;
  border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;
  padding:10px 0;
  will-change:auto;
  animation:none !important;
}

/* ========== ✅ 战斗角色：攻击 + 受击 动效 ========== */
.battle-unit{
  width:90px;height:90px;font-size:44px;
  display:flex;align-items:center;justify-content:center;
  position:relative;will-change:transform;
  transition:transform 0.12s cubic-bezier(0.25, 0.1, 0.25, 1);
}
/* 攻击动画：向前冲 + 放大 */
@keyframes playerAttackAnim {
  0%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-14px) scale(1.15);}
  100%{transform:translateY(0) scale(1);}
}
/* 受击动画：快速抖动 */
@keyframes enemyHitAnim {
  0%{transform:translateX(0);}
  25%{transform:translateX(-3px);}
  75%{transform:translateX(3px);}
  100%{transform:translateX(0);}
}
.player-attack{animation:playerAttackAnim 0.24s forwards;}
.enemy-hit{animation:enemyHitAnim 0.2s ease;}

.battle-unit .hp-bar{
  position:absolute;top:-8px;left:0;right:0;height:6px;
  background:#444;border-radius:3px;overflow:hidden;
}
.hp-fill{height:100%;background:#00ff84;transition:width 0.2s ease;}

.boss-label{
  position:absolute;top:-36px;left:50%;transform:translate3d(-50%,0,0);
  background:#ff4444;color:#fff;font-size:20px;font-weight:bold;
  padding:4px 10px;border-radius:6px;
}

@keyframes bossFlash {
  0%{opacity:0;transform:translate3d(-50%,0,0) scale(0.8);}
  50%{opacity:1;transform:translate3d(-50%,0,0) scale(1.2);}
  100%{opacity:0;transform:translate3d(-50%,0,0) scale(0.8);}
}
.boss-flash{
  position:absolute;top:-36px;left:50%;transform:translate3d(-50%,0,0);
  color:#ff4444;font-size:28px;font-weight:bold;
  animation:bossFlash 0.5s ease 3;
  z-index:10;will-change:transform,opacity;
}

.battle-stat{
  position:absolute;bottom:-22px;font-size:12px;color:#fff;
  background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;white-space:nowrap;
}

/* 关闭区域震动 */
.hit-shake{animation:none !important;}
@keyframes enemyDie {0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(0);}}
.enemy-die{animation:enemyDie 0.4s forwards;}
@keyframes enemySpawn {0%{opacity:0;transform:scale(0);}100%{opacity:1;transform:scale(1);}}
.enemy-spawn{animation:enemySpawn 0.4s forwards;}

.float-text{
  position:absolute;z-index:10;color:#ff0;font-weight:bold;
  font-size:20px;animation:float 0.6s forwards;
  will-change:transform,opacity;
}
@keyframes float{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
</style>
</head>

<body>
<a id="backBtn" href="index.html">← 返回</a>
<div id="version">v0.0.10</div>
<button id="guideBtn" onclick="openGuide()">📜 游戏说明</button>
<div id="fps">FPS: --</div>
<button id="rankBtn" onclick="openRank()">🏆 排行榜</button>
<div id="levelBar">关卡：1-1</div>
<div id="goldBar">💰 金币: 0</div>

<!-- 游戏说明弹窗 -->
<div id="guidePanel">
  <div class="guide-content">
    <h3>📜 游戏规则说明</h3>
    <p>1. 点击下方角色进行攻击，击败敌人可获得金币</p>
    <p>2. 敌人死亡后可尝试捕获，加入你的队伍</p>
    <p>3. 金币可用于角色升级、复活，提升战斗力</p>
    <p>4. 角色死亡后掩埋，可返还100%升级花费金币</p>
    <p>5. 通关关卡、挑战BOSS，冲击更高关卡排名</p>
    <p>6. 每关5波敌人，第5波为强力BOSS</p>
  </div>
  <button id="closeGuide" onclick="closeGuide()">我知道了</button>
</div>

<div id="captureTip">
  <div id="diceRoll">?</div>
  <div id="captureText"></div>
</div>

<div id="rankPanel">
  <h2>🏆 最高关卡排行榜</h2>
  <div id="rankList"></div>
  <button id="closeRank" onclick="closeRank()">关闭</button>
</div>

<div id="game">
  <div id="battleZone">
    <div id="enemyBattle" class="battle-unit">
      <div class="hp-bar"><div class="hp-fill"></div></div>
      <div class="battle-stat"></div>
    </div>
    <div id="playerBattle" class="battle-unit">
      <div class="hp-bar"><div class="hp-fill"></div></div>
      <div class="battle-stat"></div>
    </div>
  </div>
  <div id="playerTeam" class="team-area"></div>
</div>

<script>
// ==========================
// DOM元素
// ==========================
const captureTip = document.getElementById('captureTip');
const diceRoll = document.getElementById('diceRoll');
const captureText = document.getElementById('captureText');
const playerTeamEl = document.getElementById('playerTeam');
const playerBattle = document.getElementById('playerBattle');
const enemyBattle = document.getElementById('enemyBattle');
const goldBar = document.getElementById('goldBar');
const levelBar = document.getElementById('levelBar');
const battleZone = document.getElementById('battleZone');
const rankList = document.getElementById('rankList');
const rankPanel = document.getElementById('rankPanel');
const fpsEl = document.getElementById('fps');
const guidePanel = document.getElementById('guidePanel');

// ==========================
// 游戏说明弹窗控制
// ==========================
function openGuide(){
  guidePanel.style.display = 'flex';
}
function closeGuide(){
  guidePanel.style.display = 'none';
}

// ==========================
// 初始队伍（增加 lastCost + reviveCount + totalUpgradeCost）
// ==========================
let playerTeam = [
  {emoji:'🐹', atk:1, hp:3, maxHp:3, level:1, lastCost:0, totalUpgradeCost:0, reviveCount:0},
  {emoji:'🐹', atk:2, hp:6, maxHp:6, level:1, lastCost:0, totalUpgradeCost:0, reviveCount:0},
  {emoji:'🐹', atk:2, hp:6, maxHp:6, level:1, lastCost:0, totalUpgradeCost:0, reviveCount:0},
  {emoji:'🐹', atk:5, hp:9, maxHp:9, level:1, lastCost:0, totalUpgradeCost:0, reviveCount:0},
];

let levelData = {
  currentLevel:1, currentWave:1, maxWave:5,
  minionAtk:1, minionHp:2, isBoss:false
};

let enemy = {atk:1, hp:2, maxHp:2, emoji:'👿', isBoss:false};
let gold = 0;
let isAttacking = false;
let isBossLoading = false;
let currentBattleUnitIndex = -1;

// ==========================
// 性能优化：对象池 + FPS
// ==========================
const floatPool = [];
const levelUpPool = [];
let diceInterval = null;
let fps = 0, lastTime = performance.now();

function calcFPS() {
  const now = performance.now();
  const delta = now - lastTime;
  fps = Math.round(1000 / delta);
  lastTime = now;
  fpsEl.textContent = `FPS: ${fps}`;
  requestAnimationFrame(calcFPS);
}

// ==========================
// 对象池：伤害飘字
// ==========================
function getFloatElem() {
  let el = floatPool.pop();
  if (!el) {
    el = document.createElement('div');
    el.className = 'float-text';
  }
  el.style.display = '';
  return el;
}
function recycleFloat(el) {
  el.style.display = 'none';
  el.textContent = '';
  floatPool.push(el);
}

// ==========================
// 对象池：升级飘字
// ==========================
function getLevelUpElem() {
  let el = levelUpPool.pop();
  if (!el) {
    el = document.createElement('div');
    el.className = 'levelUpText';
  }
  el.style.display = '';
  return el;
}
function recycleLevelUp(el) {
  el.style.display = 'none';
  el.textContent = '';
  levelUpPool.push(el);
}

// ==========================
// ✅ 优化捕获：BOSS 成功率 -20%
// ==========================
function tryCaptureEnemy(enemyUnit) {
  captureTip.classList.add('show');
  diceRoll.textContent = '?';
  captureText.textContent = '开始掷骰子...';

  const finalDice = Math.floor(Math.random() * 9) + 1;
  let chance = finalDice * 10 + 10;
  
  // BOSS捕获概率 -20%，最低不低于0
  if (enemyUnit.isBoss) {
    chance = Math.max(0, chance - 20);
  }
  
  // 更快的骰子速度
  const rollSpeed = 18;
  let rollCount = 0, maxRoll = 6;

  if (diceInterval) clearInterval(diceInterval);
  diceInterval = setInterval(() => {
    diceRoll.textContent = Math.floor(Math.random() * 9) + 1;
    if (++rollCount >= maxRoll) {
      clearInterval(diceInterval); diceInterval = null;
      diceRoll.textContent = finalDice;
      
      setTimeout(() => {
        const success = Math.random() * 100 < chance;
        if (success) {
          if (playerTeam.length < 12) {
            playerTeam.push({
              emoji: enemyUnit.emoji,
              atk: enemyUnit.atk,
              hp: enemyUnit.maxHp,
              maxHp: enemyUnit.maxHp,
              level: 1,
              lastCost: 0,
              totalUpgradeCost:0,
              reviveCount:0
            });
            captureText.innerHTML = `🎯 ${chance}% 概率<br/>捕获成功！`;
          } else {
            captureText.innerHTML = `✅ 队伍已满`;
          }
        } else {
          captureText.innerHTML = `❌ ${chance}% 概率<br/>捕获失败`;
        }
        
        // ✅ 关闭弹窗更快
        setTimeout(() => {
          captureTip.classList.remove('show');
          // 捕获结束直接刷怪
          setTimeout(()=>nextMonster(), 100);
        }, 300);
        
      }, 100);
    }
  }, rollSpeed);
}

// ==========================
// 飘字显示
// ==========================
function showLevelUpText(el) {
  const t = getLevelUpElem();
  t.textContent = '升级！攻击+20% 生命+20%';
  el.appendChild(t);
  setTimeout(() => {
    t.remove();
    recycleLevelUp(t);
  }, 800);
}
function showFloat(dmg, el) {
  const t = getFloatElem();
  t.textContent = '-' + dmg;
  el.appendChild(t);
  setTimeout(() => {
    t.remove();
    recycleFloat(t);
  }, 600);
}

// ==========================
// ✅ 排行榜：按最高关卡排名
// ==========================
function saveRank() {
  let ranks = JSON.parse(localStorage.getItem('pigRank')) || [];
  
  const current = {
    level: levelData.currentLevel,
    gold: gold
  };

  ranks.push(current);
  
  // 去重
  let unique = [];
  let keys = new Set();
  ranks.forEach(item => {
    const key = `${item.level}-${item.gold}`;
    if(!keys.has(key)){
      keys.add(key);
      unique.push(item);
    }
  });

  // 排序：关卡高 → 金币高
  unique.sort((a,b)=>{
    if(b.level !== a.level) return b.level - a.level;
    return b.gold - a.gold;
  });

  ranks = unique.slice(0,10);
  localStorage.setItem('pigRank', JSON.stringify(ranks));
}

function openRank() {
  saveRank();
  rankList.innerHTML = '';
  let ranks = JSON.parse(localStorage.getItem('pigRank')) || [];
  
  ranks.forEach((item,i)=>{
    const div = document.createElement('div');
    div.className='rank-item';
    div.innerHTML = `
      第${i+1}名<br/>
      最高关卡：${item.level} 关<br/>
      总金币：💰${item.gold}
    `;
    rankList.appendChild(div);
  });
  
  rankPanel.style.display = 'flex';
}
function closeRank() { rankPanel.style.display = 'none'; }

// ==========================
// 初始化
// ==========================
function startGame() { updateLevelDisplay(); renderAll(); }
function updateLevelDisplay() { levelBar.textContent = `关卡：${levelData.currentLevel}-${levelData.currentWave}`; }
function renderAll() { renderTeams(); renderEnemy(); updateGold(); }
function updateGold() { goldBar.textContent = `💰 金币: ${gold}`; }

// ==========================
// ✅ 最终升级费用：1级特殊，5级×1.5，其余×1.2
// ==========================
function getUpgradeCost(unit) {
  let cost;
  
  // 1级升2级
  if (unit.level === 1) {
    cost = Math.ceil(unit.atk * 1.2);
  } 
  // 5级、10级、15级... 升下一级：×1.5
  else if (unit.level % 5 === 0) {
    cost = Math.ceil(unit.lastCost * 1.5);
  } 
  // 其他等级：×1.2
  else {
    cost = Math.ceil(unit.lastCost * 1.2);
  }
  
  return cost;
}

// ==========================
// 渲染队伍
// ==========================
function renderTeams() {
  playerTeamEl.innerHTML = '';
  playerTeam.forEach((unit, idx) => {
    const div = document.createElement('div');
    const alive = unit.hp > 0;
    div.className = 'creature ' + (alive ? 'alive' : 'dead');
    let btns = '';
    const cost = getUpgradeCost(unit);
    
    if (alive) {
      btns = `
        <button class="btn up" onclick="upgrade(${idx});event.stopPropagation();" ${gold < cost ? 'disabled' : ''}>升级</button>
        <div style="font-size:11px;">💰${cost}</div>
      `;
    } else {
      // ✅ 复活费用：每3次×2
      let mul = 1;
      for(let i=0;i<Math.floor(unit.reviveCount/3);i++) mul *=2;
      const reviveCost = unit.maxHp * mul;
      const canRevive = gold >= reviveCost;
      
      btns = `
        <button class="btn rev" onclick="revive(${idx});event.stopPropagation();" ${!canRevive ? 'disabled' : ''}>复活</button>
        <div style="font-size:11px;color:#ffd000;margin-top:2px;">💰${reviveCost}</div>
        <button class="btn bur" onclick="bury(${idx});event.stopPropagation();">掩埋</button>
      `;
    }
    const hpDisplay = alive ? unit.hp : unit.maxHp;
    div.innerHTML = `
      <div class="level">Lv${unit.level}</div>
      ${unit.emoji}
      <div class="stat">🗡️${unit.atk}</div>
      <div class="stat">❤️${hpDisplay}</div>
      ${btns}
    `;
    div.onclick = () => alive && playerAttack(idx);
    playerTeamEl.appendChild(div);
  });
}

// ==========================
// 渲染敌人
// ==========================
function renderEnemy() {
  const bossTag = enemy.isBoss ? '<div class="boss-label">BOSS</div>' : '';
  enemyBattle.innerHTML = `
    ${bossTag}
    ${enemy.emoji}
    <div class="hp-bar"><div class="hp-fill" style="width:${enemy.hp / enemy.maxHp * 100}%"></div></div>
    <div class="battle-stat">🗡️${enemy.atk} ❤️${enemy.hp}</div>
  `;
}

function renderCurrentBattleUnit() {
  if (currentBattleUnitIndex < 0 || currentBattleUnitIndex >= playerTeam.length) return;
  const u = playerTeam[currentBattleUnitIndex];
  playerBattle.innerHTML = `
    ${u.emoji}
    <div class="hp-bar"><div class="hp-fill" style="width:${u.hp / u.maxHp * 100}%"></div></div>
    <div class="battle-stat">🗡️${u.atk} ❤️${u.hp}</div>
  `;
  if (u.hp <= 0) { playerBattle.innerHTML = ''; currentBattleUnitIndex = -1; }
}

// ==========================
// ✅ 攻击
// ==========================
function playerAttack(index) {
  if (isAttacking || isBossLoading) return;
  const u = playerTeam[index];
  if (!u || u.hp <= 0) return;

  isAttacking = true;
  currentBattleUnitIndex = index;
  renderCurrentBattleUnit();

  playerBattle.classList.add('player-attack');
  setTimeout(()=>playerBattle.classList.remove('player-attack'),240);

  setTimeout(() => {
    enemyBattle.classList.add('enemy-hit');
    setTimeout(()=>enemyBattle.classList.remove('enemy-hit'),200);

    u.hp -= enemy.atk;
    enemy.hp -= u.atk;
    showFloat(u.atk, enemyBattle);
    renderTeams(); renderEnemy(); renderCurrentBattleUnit();

    if (enemy.hp <= 0) {
      enemyBattle.classList.add('enemy-die');
      setTimeout(() => {
        gold += enemy.maxHp;
        saveRank();
        renderTeams(); updateGold();
        
        tryCaptureEnemy(enemy);
        
        enemyBattle.classList.remove('enemy-die');
        enemy = { atk: 0, hp: 0, maxHp: 0, emoji: '', isBoss: false };
        renderEnemy();
      }, 360);
    }
    setTimeout(() => { isAttacking = false; renderCurrentBattleUnit(); }, 240);
  }, 240);
}

// ==========================
// 下一波
// ==========================
function nextMonster() {
  levelData.currentWave++;
  if (levelData.currentWave > levelData.maxWave) {
    levelData.currentLevel++;
    levelData.currentWave = 1;
    generateNewMinionStats();
  }
  levelData.isBoss = (levelData.currentWave === levelData.maxWave);
  updateLevelDisplay();

  if (levelData.isBoss) {
    isBossLoading = true;
    const flash = document.createElement('div');
    flash.className = 'boss-flash';
    flash.textContent = 'BOSS';
    enemyBattle.appendChild(flash);
    setTimeout(() => {
      flash.remove();
      spawnCurrentMonster();
      renderAll();
      isBossLoading = false;
    }, 800);
  } else {
    spawnCurrentMonster();
    renderAll();
  }
}

function generateNewMinionStats() {
  let atk = levelData.minionAtk;
  let hp = levelData.minionHp;
  const rAtk = Math.random();
  const rHp = Math.random();
  if (rAtk < 0.5) atk += 1; else if (rAtk < 0.7) atk += 2; else if (rAtk < 0.8) atk = Math.floor(atk * 1.5);
  if (rHp < 0.5) hp += 1; else if (rHp < 0.7) hp += 2; else if (rHp < 0.8) hp = Math.floor(hp * 1.5);
  levelData.minionAtk = atk;
  levelData.minionHp = hp;
}

function spawnCurrentMonster() {
  const isBoss = levelData.isBoss;
  let atk, hp, emoji;
  if (isBoss) {
    const rate = 3 + Math.random() * 2;
    atk = Math.floor(levelData.minionAtk * rate);
    hp = Math.floor(levelData.minionHp * rate);
    emoji = ['👹', '🐲', '🦖', '🦕', '🐉', '👺'][Math.floor(Math.random() * 6)];
  } else {
    atk = levelData.minionAtk;
    hp = levelData.minionHp;
    emoji = ['👿', '🐗', '🐻', '🐺', '🦍', '🐊', '🦖', '🦕', '🐲', '👹', '🦁', '🐯'][Math.floor(Math.random() * 12)];
  }
  enemy = { atk, hp, maxHp: hp, emoji, isBoss };
  enemyBattle.classList.add('enemy-spawn');
  setTimeout(() => enemyBattle.classList.remove('enemy-spawn'), 400);
}

// ==========================
// ✅ 升级：属性+20% + 记录总花费
// ==========================
function upgrade(index) {
  const u = playerTeam[index];
  const card = playerTeamEl.children[index];
  const cost = getUpgradeCost(u);
  
  if (gold >= cost) {
    gold -= cost;
    u.atk = Math.floor(u.atk * 1.2);
    u.maxHp = Math.floor(u.maxHp * 1.2);
    u.hp = u.maxHp;
    u.lastCost = cost;
    u.totalUpgradeCost = (u.totalUpgradeCost || 0) + cost; // 累计升级花费
    u.level += 1;
    showLevelUpText(card);
    renderAll();
  }
}

// ==========================
// ✅ 复活：每3次费用×2
// ==========================
function revive(index) {
  const u = playerTeam[index];
  let mul = 1;
  for(let i=0;i<Math.floor(u.reviveCount/3);i++) mul *=2;
  const cost = u.maxHp * mul;
  
  if (gold >= cost) {
    gold -= cost;
    u.hp = u.maxHp;
    u.reviveCount +=1;
    renderAll();
  }
}

// ==========================
// ✅ 掩埋：返还 1金币 + 全部升级花费
// ==========================
function bury(index) {
  const u = playerTeam[index];
  const refund = 1 + (u.totalUpgradeCost || 0); // 返还所有升级花费
  gold += refund;
  
  if (currentBattleUnitIndex === index) currentBattleUnitIndex = -1;
  playerTeam.splice(index, 1);
  renderAll();
}

// 启动
calcFPS();
startGame();
</script>
