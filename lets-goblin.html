<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>疯狂麦克斯 🚛 终极版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#000;color:#fff;font-family:Arial,sans-serif;
  overflow:hidden;user-select:none;width:100vw;height:100vh;
}
@keyframes float{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
@keyframes hit{0%{transform:scale(1);}50%{transform:scale(.9);}100%{transform:scale(1);}}
@keyframes bossWarning{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
@keyframes shieldPulse{0%{box-shadow:0 0 10px #0ff;}50%{box-shadow:0 0 20px #0ff;}100%{box-shadow:0 0 10px #0ff;}}
@keyframes boostPulse{0%{box-shadow:0 0 10px #ff0;}50%{box-shadow:0 0 20px #ff0;}100%{box-shadow:0 0 10px #ff0}}
@keyframes ragePulse{0%{box-shadow:0 0 10px #f44;}50%{box-shadow:0 0 20px #f44;}100%{box-shadow:0 0 10px #f44}}
@keyframes truckHurt{0%{filter:brightness(1);}50%{filter:brightness(0.5) sepia(1) hue-rotate(-50deg);}100%{filter:brightness(1);}}

#topUI{position:fixed;top:0;left:0;right:0;z-index:9999;padding:8px;display:flex;justify-content:space-between;align-items:flex-start;}
#version{background:#0006;padding:4px 8px;border-radius:6px;color:#0ff;font-size:12px;}
#distance{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:9999;font-size:16px;font-weight:bold;color:#ffcc00;text-shadow:0 0 4px #000;}
#level{position:fixed;top:30px;left:50%;transform:translateX(-50%);z-index:9999;font-size:14px;color:#fff;text-shadow:0 0 0 4px #000;}
.bossWarn{animation:bossWarning 0.5s infinite;color:#f44!important;}

#resource{position:fixed;top:50px;left:10px;z-index:9999;background:#0008;padding:6px 8px;border-radius:8px;display:flex;gap:8px;font-size:12px;}
#status{position:fixed;top:50px;right:10px;z-index:9999;background:#0008;padding:6px 8px;border-radius:8px;font-size:12px;line-height:1.4;}

/* 永久左侧任务面板 */
#questFixed{
  position:fixed; left:10px; top:100px; z-index:9998;
  background:#000a; padding:10px; border-radius:8px;
  width:180px; font-size:12px; line-height:1.6;
}

/* 等级标签 */
.levelLabel{
  font-size:11px; color:#ff0; margin-bottom:2px;
}

#menu{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
}
.btn{padding:8px 12px;border-radius:8px;border:none;font-size:13px;font-weight:bold;color:#fff;cursor:pointer;}
.btn:disabled{background:#444!important;color:#888;}
.btn-up{background:#26a;}
.btn-skin{background:#62a;}

.panel{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.95);z-index:100000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.panel.show{display:flex;}
.pContent{background:#1a1a2e;border:2px solid #fc0;border-radius:12px;padding:20px;width:90%;max-width:400px;line-height:1.6;}
.pClose{margin-top:16px;padding:8px 20px;background:#f44;color:#fff;border:none;border-radius:8px;cursor:pointer;}

#game{width:100vw;height:100vh;position:relative;overflow:hidden;background:linear-gradient(to bottom, #2d3f4a, #1a2a3a);transition:background 1.5s ease;}
.bg{position:absolute;width:100%;height:300%;top:0;left:0;background-image:linear-gradient(transparent 50%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0.03) 100%);background-size:100% 40px;animation:scroll 8s linear infinite;}
@keyframes scroll{0%{transform:translateY(0);}100%{transform:translateY(-40px);}}

#hitLine{
  position:absolute;left:0;right:0;height:2px;
  background:#ff3333;box-shadow:0 0 6px #f44;
  z-index:100;display:none;
}

#truck{width:80px;height:100px;position:absolute;z-index:10;left:calc(50% - 40px);bottom:120px;font-size:70px;text-align:center;transition:all 0.2s;}
.truck-shield{animation:shieldPulse 1s infinite;}
.truck-boost{animation:boostPulse 1s infinite;}
.truck-rage{animation:ragePulse 1s infinite;}
.truck-hurt{animation:truckHurt 0.3s;}

.bullet{width:6px;height:12px;background:#ff0;border-radius:3px;position:absolute;z-index:5;box-shadow:0 0 6px #ff0;}

/* 放大：敌人 */
.enemy{width:80px;height:80px;font-size:55px;text-align:center;position:absolute;z-index:8;}
.elite{width:100px;height:100px;font-size:65px;text-align:center;position:absolute;z-index:8;background:#6444;border-radius:12px;color:#fc0;}
.enemy-hit,.elite-hit{animation:hit 0.2s;}
.boss{width:150px;height:150px;font-size:110px;text-align:center;position:absolute;z-index:9;background:#f448;border-radius:24px;color:#fff;}

/* 放大：资源 + 道具（手机友好） */
.resource,.item{width:70px;height:70px;font-size:45px;text-align:center;position:absolute;z-index:7;cursor:pointer;}

.float{position:absolute;z-index:20;color:#ff0;font-size:14px;font-weight:bold;animation:float 0.6s forwards;pointer-events:none;}

#deadPanel{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.9);z-index:200000;display:none;flex-direction:column;align-items:center;justify-content:center;}
#reviveBtn{padding:12px 24px;background:#fc0;color:#000;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;}
</style>
</head>

<body>
<div id="topUI">
  <div id="version">v1.1 无卡死稳定版</div>
</div>
<div id="distance">🚗 0 公里</div>
<div id="level">🟢 第 1 关 · 平原</div>
<div id="resource">
  <div>🍎<span id="a">0</span></div>
  <div>🪵<span id="w">0</span></div>
  <div>🪨<span id="s">0</span></div>
  <div>⭐<span id="st">0</span></div>
</div>
<div id="status">
  <div>❤️<span id="hp">100</span>/<span id="mhp">100</span></div>
  <div>🚀<span id="sp">1</span></div>
  <div>⚔️<span id="atk">5</span></div>
  <div>📈<span id="asp">800</span>ms</div>
</div>

<!-- 永久左侧任务 -->
<div id="questFixed">
  <h4 style="color:#fc0;margin-bottom:6px">📜 任务</h4>
  <div id="qListFixed"></div>
</div>

<!-- 底部按钮：只保留3个 -->
<div id="menu">
  <div style="display:flex;flex-direction:column;align-items:center">
    <div class="levelLabel" id="truckLevel">卡车 Lv.1</div>
    <button class="btn btn-up" onclick="upTruck()">升级卡车</button>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center">
    <div class="levelLabel" id="gunLevel">武器 Lv.1</div>
    <button class="btn btn-up" onclick="upGun()">升级武器</button>
  </div>

  <button class="btn btn-skin" onclick="openSkin()">🎨皮肤</button>
</div>

<div class="panel" id="skin">
  <div class="pContent">
    <h3>🎨 卡车皮肤</h3>
    <p onclick="setSkin(0)" style="cursor:pointer">🚛 默认卡车</p>
    <p onclick="setSkin(1)" style="cursor:pointer">🚜 农用卡车</p>
    <p onclick="setSkin(2)" style="cursor:pointer">🚌 巴士战车</p>
    <p onclick="setSkin(3)" style="cursor:pointer">🚚 装甲卡车</p>
    <p onclick="setSkin(4)" style="cursor:pointer">🏎️ 极速跑车</p>
  </div>
  <button class="pClose" onclick="closePanel()">关闭</button>
</div>

<div id="deadPanel">
  <h2>💀 卡车损毁</h2>
  <p style="margin:10px 0;">行驶里程：<span id="deadDist">0</span> 公里</p>
  <button id="reviveBtn" onclick="revive()">✅ 免费复活</button>
  <br>
  <button onclick="restart()">🔄 重新开始</button>
</div>

<div id="game">
  <div class="bg"></div>
  <div id="hitLine"></div>
  <div id="truck">🚛</div>
</div>

<script>
localStorage.removeItem('madmax_final');

const game = document.getElementById('game');
const truck = document.getElementById('truck');
const hitLine = document.getElementById('hitLine');
const skins = ['🚛','🚜','🚌','🚚','🏎️'];
const themes = [
  {bg:'#2d3f4f,#1a2a3a',name:'平原'},
  {bg:'#e9b86f,#c78b35',name:'沙漠'},
  {bg:'#8c8c8e,#5c5c6e',name:'城市'},
  {bg:'#e0f0ff,#b8d8ff',name:'雪地'}
];

let data = {
  dist:0, px:0, hp:100, mhp:100, sp:1, atk:5, asp:800,
  a:0, w:0, s:0, st:0, lvl:1, boss:false, theme:0, skin:0,
  shield:0, boost:0, rage:0,
  quest:[0,0,0], reward:[0,0,0],
  bullets:[], enemies:[], res:[], items:[],
  shootTimer:null, dead:false, lastTime:0,
  spawnCount:0,
  truckLv:1, gunLv:1, bulletSpeed:12
};

const RESOURCE_SPAWN_RATE = 70;
const MAX_RESOURCE_ON_SCREEN = 10; // 屏幕资源上限

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function save(){}
function openSkin(){document.getElementById('skin').classList.add('show');}
function closePanel(){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));}
function setSkin(id){data.skin=id;truck.textContent=skins[id];closePanel();}
function hurtTruck(){truck.classList.add('truck-hurt');setTimeout(()=>truck.classList.remove('truck-hurt'),300);}

// 按钮上方浮动提示（精确位置）
function floatAtButton(txt, btnEl){
  const f=document.createElement('div');f.className='float';f.textContent=txt;
  const rect = btnEl.getBoundingClientRect();
  f.style.left = (rect.left + rect.width/2 - 20) + 'px';
  f.style.top = (rect.top - 30) + 'px';
  game.appendChild(f);
  setTimeout(()=>f.remove(), 900);
}

function float(txt,x,y){
  const f=document.createElement('div');f.className='float';f.textContent=txt;
  f.style.left=x+'px';f.style.top=y+'px';game.appendChild(f);setTimeout(()=>f.remove(),600);
}

function updateTheme(){
  const t=themes[data.theme%4];
  game.style.background=`linear-gradient(to bottom, ${t.bg.split(',')[0]}, ${t.bg.split(',')[1]})`;
  const el=document.getElementById('level');
  el.textContent=`🟢 第 ${data.lvl} 关 · ${t.name}`;
  el.className=data.boss?'bossWarn':'';
}

function getNearest(){
  if(data.enemies.length===0)return null;
  let near=null,min=9999;
  const truckTop = truck.offsetTop;
  const attackRange = 800;
  
  data.enemies.forEach(e=>{
    const eTop = e.offsetTop;
    if(eTop >= truckTop - attackRange && eTop <= truckTop){
      const d = Math.abs(eTop - truckTop);
      if(d < min){min=d;near=e;}
    }
  });
  return near;
}

// 多发射子弹：每10级+1发
function shoot(){
  if(data.dead)return;
  const tar=getNearest();if(!tar)return;
  const tx=truck.offsetLeft+40,ty=truck.offsetTop-10;
  
  const bulletCount = 1 + Math.floor(data.gunLv / 10);
  
  for(let i=0;i<bulletCount;i++){
    setTimeout(()=>{
      const b=document.createElement('div');b.className='bullet';
      b.style.left=tx+'px';b.style.top=ty+'px';b.tarX=tar.offsetLeft+30;
      game.appendChild(b);data.bullets.push(b);
    }, i*60);
  }
}

function spawnOneEnemy(){
  if(data.dead||data.boss)return;
  if(rand(1,100)<=20){
    const e=document.createElement('div');e.className='elite';e.textContent=['👿','🦂','🦑','🐉'][rand(0,3)];
    e.style.left=rand(50,window.innerWidth-130)+'px';e.style.top='-90px';e.hp=data.lvl*8+25;
    game.appendChild(e);data.enemies.push(e);
  }else{
    const e=document.createElement('div');e.className='enemy';e.textContent=['👹','👺','🐗','🐻','🐺'][rand(0,4)];
    e.style.left=rand(50,window.innerWidth-110)+'px';e.style.top='-80px';e.hp=data.lvl*5+15;
    game.appendChild(e);data.enemies.push(e);
  }
}

function spawnBoss(){
  data.boss=true;
  const b=document.createElement('div');b.className='boss';b.textContent='👹';
  b.style.left=window.innerWidth/2-65+'px';b.style.top='-150px';b.hp=data.lvl*60+150;
  game.appendChild(b);data.enemies.push(b);
  float('⚠️ BOSS出现!',window.innerWidth/2-50,100);
  updateTheme();
}

// 资源刷新：上限10个
function spawnResourceBatch(){
  if(data.dead) return;
  if(data.res.length >= MAX_RESOURCE_ON_SCREEN) return;
  if(rand(1, 100) > RESOURCE_SPAWN_RATE) return;
  
  let canSpawn = MAX_RESOURCE_ON_SCREEN - data.res.length;
  if(canSpawn <=0) return;
  const count = Math.min(canSpawn, Math.max(1, data.dist + 1));
  
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(data.res.length >= MAX_RESOURCE_ON_SCREEN) return;
      const r=document.createElement('div');r.className='resource';
      const list=[{e:'🍎',t:'a'},{e:'🪵',t:'w'},{e:'🪨',t:'s'}];
      const sel=list[rand(0,2)];r.textContent=sel.e;
      r.style.left=rand(40,window.innerWidth-90)+'px';r.style.top='-70px';
      r.t=sel.t;r.cnt=rand(2,5);
      r.onclick=()=>{
        if(r.cnt<=0)return;r.cnt--;data[sel.t]++;
        float('+'+sel.e,r.offsetLeft+10,r.offsetTop);
        if(r.cnt<=0){r.remove();data.res=data.res.filter(i=>i!==r);}
        updateUI();
      }
      game.appendChild(r);data.res.push(r);
    }, i*200);
  }
}

function spawnItem(){
  if(data.dead)return;
  const i=document.createElement('div');i.className='item';
  const items=['❤️','⚡','🛡️','⭐'];i.textContent=items[rand(0,3)];
  i.style.left=rand(50,window.innerWidth-90)+'px';i.style.top='-70px';
  i.onclick=()=>{
    if(i.textContent=='❤️')data.hp=Math.min(data.mhp,data.hp+30);
    if(i.textContent=='⚡'){data.asp=Math.max(200,data.asp-100);restartShoot();}
    if(i.textContent=='🛡️')data.shield=600;
    if(i.textContent=='⭐')data.st+=5;
    float(i.textContent,i.offsetLeft,i.offsetTop);i.remove();data.items=data.items.filter(x=>x!==i);updateUI();
  }
  game.appendChild(i);data.items.push(i);
  setTimeout(spawnItem,rand(8000,16000));
}

// ================== 任务永久显示 ==================
function renderQuestFixed(){
  const el=document.getElementById('qListFixed');
  el.innerHTML=`
    <p>行驶10公里 (${data.quest[0]}/10)</p>
    <p>击败30敌人 (${data.quest[1]}/30)</p>
    <p>收集50资源 (${data.quest[2]}/50)</p>
  `;
}

// ================== 升级卡车 ==================
function upTruck(){
  const btn = this.event.currentTarget;
  const lv = data.truckLv;
  const cost = Math.floor(20 * Math.pow(1.6, lv-1));
  
  if(data.a >= cost && data.w >= cost && data.s >= cost){
    data.a -= cost;
    data.w -= cost;
    data.s -= cost;
    data.truckLv +=1;
    data.sp += 0.01;
    data.mhp +=10;
    data.hp = data.mhp;
    updateUI();
    floatAtButton('卡车升级!', btn);
  }else{
    const needA = cost - data.a;
    const needW = cost - data.w;
    const needS = cost - data.s;
    let msg = "缺:";
    if(needA>0) msg += `🍎${needA} `;
    if(needW>0) msg += `🪵${needW} `;
    if(needS>0) msg += `🪨${needS}`;
    floatAtButton(msg, btn);
  }
}

// ================== 升级武器 ==================
function upGun(){
  const btn = this.event.currentTarget;
  const lv = data.gunLv;
  const cost = Math.floor(100 * Math.pow(2.5, lv-1));
  
  if(data.a >= cost && data.w >= cost && data.s >= cost){
    data.a -= cost;
    data.w -= cost;
    data.s -= cost;
    data.gunLv +=1;
    data.atk +=1;
    data.bulletSpeed += 1;
    data.asp = Math.max(180, data.asp - 10);
    restartShoot();
    updateUI();
    floatAtButton('武器升级!', btn);
  }else{
    const needA = cost - data.a;
    const needW = cost - data.w;
    const needS = cost - data.s;
    let msg = "缺:";
    if(needA>0) msg += `🍎${needA} `;
    if(needW>0) msg += `🪵${needW} `;
    if(needS>0) msg += `🪨${needS}`;
    floatAtButton(msg, btn);
  }
}

function restartShoot(){clearInterval(data.shootTimer);data.shootTimer=setInterval(shoot,data.asp);}

// ================== UI更新 ==================
function updateUI(){
  document.getElementById('a').textContent=data.a;
  document.getElementById('w').textContent=data.w;
  document.getElementById('s').textContent=data.s;
  document.getElementById('st').textContent=data.st;
  document.getElementById('hp').textContent=Math.max(0,Math.floor(data.hp));
  document.getElementById('mhp').textContent=data.mhp;
  document.getElementById('sp').textContent=data.sp.toFixed(2);
  document.getElementById('atk').textContent=data.atk;
  document.getElementById('asp').textContent=data.asp;
  document.getElementById('distance').textContent=`🚗 ${data.dist} 公里`;
  
  document.getElementById('truckLevel').innerText = `卡车 Lv.${data.truckLv}`;
  document.getElementById('gunLevel').innerText = `武器 Lv.${data.gunLv}`;
  
  truck.textContent=skins[data.skin];
  truck.className='';
  if(data.shield>0)truck.classList.add('truck-shield');
  if(data.boost>0)truck.classList.add('truck-boost');
  if(data.rage>0)truck.classList.add('truck-rage');
  
  hitLine.style.top = truck.offsetTop + 'px';
  hitLine.style.display = 'block';
  
  renderQuestFixed();
}

// ================== 死亡 ==================
function gameOver(){data.dead=true;document.getElementById('deadDist').textContent=data.dist;document.getElementById('deadPanel').style.display='flex';}
function revive(){data.dead=false;data.hp=data.mhp/2;document.getElementById('deadPanel').style.display='none';}
function restart(){localStorage.removeItem('madmax_final');location.reload();}

// ================== 主循环 ==================
function loop(timestamp){
  if(data.dead)return;
  if(!data.lastTime)data.lastTime=timestamp;
  const delta=Math.min((timestamp-data.lastTime)/1000,0.05);
  data.lastTime=timestamp;

  const MOVE_SPEED=10 * data.sp;
  const move=MOVE_SPEED*delta;

  const lastDist = data.dist;
  data.px+=move;
  if(data.px>=100){
    data.dist+=Math.floor(data.px/100);
    data.px%=100;
    data.quest[0]++;
    
    if(data.dist > lastDist && !data.boss){
      const num = Math.max(1, data.lvl);
      for(let i=0; i<num; i++){
        setTimeout(spawnOneEnemy, i*300);
      }
      spawnResourceBatch();
    }

    if(data.dist%15===0&&data.dist!=0&&!data.boss&&data.enemies.length===0){
      data.lvl++;data.theme++;updateTheme();spawnBoss();
    }
  }

  if(data.shield>0)data.shield-=delta*60;
  if(data.boost>0)data.boost-=delta*60;
  if(data.rage>0)data.rage-=delta*60;

  data.bullets.forEach((b,i)=>{
    let x=parseFloat(b.style.left),y=parseFloat(b.style.top);
    y -= data.bulletSpeed * delta * 20;
    if(b.tarX!==undefined){const dx=b.tarX-x;x+=dx*0.2;b.style.left=x+'px';}
    b.style.top=y+'px';if(y<-30){b.remove();data.bullets.splice(i,1);}
  });

  data.enemies.forEach((e,i)=>{
    let y=parseFloat(e.style.top)||0;y+=move;e.style.top=y+'px';

    data.bullets.forEach((b,j)=>{
      const bx=b.offsetLeft,by=b.offsetTop,ex=e.offsetLeft,ey=e.offsetTop;
      const w=e.classList.contains('boss')?150:e.classList.contains('elite')?100:80;
      if(bx>ex&&bx<ex+w&&by>ey&&by<ey+w){
        const dmg=data.rage>0?data.atk*2:data.atk;
        e.hp-=dmg;e.classList.add(e.classList.contains('elite')?'elite-hit':'enemy-hit');
        setTimeout(()=>e.classList.remove(e.classList.contains('elite')?'elite-hit':'enemy-hit'),200);
        float('-'+dmg,ex+20,ey);b.remove();data.bullets.splice(j,1);
        if(e.hp<=0){
          if(e.classList.contains('boss')){float('🎉 BOSS击败!',window.innerWidth/2-50,120);data.st+=30;data.boss=false;updateTheme();}
          else data.quest[1]++;
          e.remove();data.enemies.splice(i,1);
        }
      }
    });

    const truckY = truck.offsetTop;
    if(y >= truckY - 10 && y <= truckY + 10){
      if(data.shield<=0){
        let dmg=e.classList.contains('elite')?18:10;
        data.hp-=dmg;hurtTruck();float('💔 -'+dmg,truck.offsetLeft+20,truck.offsetTop-20);
      }
      e.remove();data.enemies.splice(i,1);
      if(data.hp<=0)gameOver();
    }
  });

  [...data.res,...data.items].forEach(obj=>{
    let y=parseFloat(obj.style.top)||0;y+=move;obj.style.top=y+'px';
    if(y>window.innerHeight){
      obj.remove();
      data.res = data.res.filter(i=>i!==obj);
      data.items = data.items.filter(i=>i!==obj);
    }
  });

  updateUI();
  requestAnimationFrame(loop);
}

// 启动
function start(){
  updateTheme();updateUI();restartShoot();
  spawnResourceBatch();
  spawnItem();
  requestAnimationFrame(loop);
}
start();
</script>
